<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search Results — AkiyaFind</title>
<meta name="description" content="Search vacant houses for sale in Japan. Browse akiya listings by prefecture, price and size.">
<link rel="canonical" href="https://akiyafind.com/search">
<meta name="theme-color" content="#C94A2A">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1208;
    --rice: #f7f3ec;
    --cream: #ede8de;
    --vermillion: #c94a2a;
    --gold: #c8922a;
    --moss: #3d5a3e;
    --mist: #a8b8b0;
    --shadow: rgba(26,18,8,0.12);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { font-family: 'DM Sans', sans-serif; background: var(--rice); color: var(--ink); }
  nav {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 48px;
    background: rgba(247,243,236,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(200,146,42,0.2);
  }
  .logo { font-family: 'Shippori Mincho', serif; font-weight: 800; font-size: 1.4rem; color: var(--ink); text-decoration: none; }
  .logo-jp { font-size: 0.6rem; color: var(--mist); letter-spacing: 2px; display: block; margin-top: -4px; text-transform: uppercase; }
  nav ul { list-style: none; display: flex; gap: 28px; align-items: center; }
  nav ul a { text-decoration: none; color: var(--ink); font-size: 0.88rem; font-weight: 500; opacity: 0.7; }
  nav ul a:hover { opacity: 1; }
  .nav-cta { background: var(--vermillion); color: white !important; opacity: 1 !important; padding: 9px 20px; border-radius: 4px; }
  .search-header { background: var(--ink); padding: 40px 48px; }
  .search-header-inner { max-width: 1200px; margin: 0 auto; }
  .search-header h1 { font-family: 'Shippori Mincho', serif; color: var(--rice); font-size: 1.8rem; font-weight: 800; margin-bottom: 20px; }
  .search-header h1 span { color: var(--gold); }
  .search-bar { display: flex; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.3); max-width: 700px; }
  .search-bar input { flex: 1; border: none; outline: none; padding: 14px 20px; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; color: var(--ink); }
  .search-bar button { background: var(--vermillion); color: white; border: none; cursor: pointer; padding: 14px 28px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 500; }
  .search-bar button:hover { background: #a83a1c; }
  .filters-bar { background: var(--cream); border-bottom: 1px solid rgba(200,146,42,0.15); padding: 16px 48px; }
  .filters-inner { max-width: 1200px; margin: 0 auto; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .filter-label { font-size: 0.78rem; font-weight: 500; color: var(--mist); letter-spacing: 1px; text-transform: uppercase; }
  .filter-select { border: 1px solid rgba(200,146,42,0.3); background: white; color: var(--ink); padding: 8px 14px; border-radius: 4px; font-family: 'DM Sans', sans-serif; font-size: 0.83rem; cursor: pointer; outline: none; }
  .filter-select:focus { border-color: var(--vermillion); }
  .filter-btn { background: var(--vermillion); color: white; border: none; cursor: pointer; padding: 8px 18px; border-radius: 4px; font-family: 'DM Sans', sans-serif; font-size: 0.83rem; font-weight: 500; }
  .filter-btn:hover { background: #a83a1c; }
  .filter-clear { background: transparent; color: var(--mist); border: 1px solid rgba(168,184,176,0.4); cursor: pointer; padding: 8px 14px; border-radius: 4px; font-family: 'DM Sans', sans-serif; font-size: 0.83rem; }
  .filter-clear:hover { color: var(--ink); }
  .results-area { max-width: 1200px; margin: 0 auto; padding: 32px 48px; }
  .results-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .results-count { font-size: 0.85rem; color: var(--mist); }
  .results-count strong { color: var(--ink); font-weight: 600; }
  .sort-select { border: 1px solid rgba(200,146,42,0.3); background: white; color: var(--ink); padding: 7px 12px; border-radius: 4px; font-family: 'DM Sans', sans-serif; font-size: 0.8rem; cursor: pointer; outline: none; }
  .results-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  .result-card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 12px var(--shadow); transition: transform 0.25s, box-shadow 0.25s; cursor: pointer; text-decoration: none; color: var(--ink); display: block; }
  .result-card:hover { transform: translateY(-3px); box-shadow: 0 8px 28px rgba(26,18,8,0.16); }
  .card-img-wrap { position: relative; aspect-ratio: 16/10; overflow: hidden; background: var(--cream); }
  .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; filter: sepia(10%) saturate(85%); transition: transform 0.4s; }
  .result-card:hover .card-img-wrap img { transform: scale(1.04); }
  .card-badge { position: absolute; top: 10px; left: 10px; background: var(--moss); color: white; font-size: 0.65rem; letter-spacing: 1.5px; text-transform: uppercase; padding: 3px 8px; border-radius: 3px; font-weight: 500; }
  .card-badge.free { background: var(--vermillion); }
  .card-body { padding: 16px 18px 18px; }
  .card-pref { font-size: 0.68rem; letter-spacing: 2px; text-transform: uppercase; color: var(--mist); margin-bottom: 5px; }
  .card-title { font-family: 'Shippori Mincho', serif; font-size: 1rem; font-weight: 600; line-height: 1.3; margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-price-aud { font-family: 'Shippori Mincho', serif; font-size: 1.3rem; font-weight: 800; color: var(--vermillion); margin-bottom: 2px; }
  .card-price-aud.free-price { color: var(--moss); }
  .card-price-jpy { font-size: 0.72rem; color: var(--mist); font-weight: 300; margin-bottom: 10px; }
  .card-meta { display: flex; gap: 8px; flex-wrap: wrap; }
  .meta-tag { background: var(--cream); color: rgba(26,18,8,0.6); font-size: 0.68rem; padding: 3px 8px; border-radius: 3px; }
  .card-source { margin-top: 10px; font-size: 0.68rem; color: var(--mist); }
  .empty-state { text-align: center; padding: 80px 24px; grid-column: 1/-1; }
  .empty-state h3 { font-family: 'Shippori Mincho', serif; font-size: 1.4rem; margin-bottom: 8px; margin-top: 16px; }
  .empty-state p { color: var(--mist); font-size: 0.9rem; }
  .loading-state { text-align: center; padding: 80px 24px; grid-column: 1/-1; }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--cream); border-top-color: var(--vermillion); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 40px; flex-wrap: wrap; }
  .page-btn { width: 36px; height: 36px; border-radius: 4px; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(200,146,42,0.2); background: white; cursor: pointer; font-size: 0.85rem; font-family: 'DM Sans', sans-serif; transition: all 0.2s; color: var(--ink); }
  .page-btn:hover, .page-btn.active { background: var(--vermillion); color: white; border-color: var(--vermillion); }
  @media (max-width: 900px) {
    nav { padding: 14px 20px; }
    nav ul { display: none; }
    .search-header { padding: 28px 20px; }
    .filters-bar { padding: 14px 20px; }
    .results-area { padding: 24px 20px; }
    .results-grid { grid-template-columns: 1fr; }
  }
  @media (min-width: 901px) and (max-width: 1100px) {
    .results-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<nav>
  <a href="/" class="logo">AkiyaFind<sup style="font-size:0.5em;color:var(--gold)">空き家</sup>
    <small class="logo-jp">Vacant Homes · Japan</small>
  </a>
  <ul>
    <li><a href="/search">Browse</a></li>
    <li><a href="/#regions">Regions</a></li>
    <li><a href="/#pricing">Pricing</a></li>
    <li><a href="#" class="nav-cta">Start Free</a></li>
  </ul>
</nav>

<div class="search-header">
  <div class="search-header-inner">
    <h1>Search <span id="result-heading">vacant homes in Japan</span></h1>
    <form class="search-bar" id="search-form">
      <input type="text" id="search-input" placeholder="Prefecture, city, or keyword… (e.g. Kyoto, Hokkaido)" autocomplete="off">
      <button type="submit">Search</button>
    </form>
  </div>
</div>

<div class="filters-bar">
  <div class="filters-inner">
    <span class="filter-label">Filter:</span>
    <select class="filter-select" id="filter-prefecture">
      <option value="">All Prefectures</option>
      <option>Hokkaido</option><option>Aomori</option><option>Iwate</option><option>Miyagi</option><option>Akita</option><option>Yamagata</option><option>Fukushima</option><option>Ibaraki</option><option>Tochigi</option><option>Gunma</option><option>Saitama</option><option>Chiba</option><option>Tokyo</option><option>Kanagawa</option><option>Niigata</option><option>Toyama</option><option>Ishikawa</option><option>Fukui</option><option>Yamanashi</option><option>Nagano</option><option>Gifu</option><option>Shizuoka</option><option>Aichi</option><option>Mie</option><option>Shiga</option><option>Kyoto</option><option>Osaka</option><option>Hyogo</option><option>Nara</option><option>Wakayama</option><option>Tottori</option><option>Shimane</option><option>Okayama</option><option>Hiroshima</option><option>Yamaguchi</option><option>Tokushima</option><option>Kagawa</option><option>Ehime</option><option>Kochi</option><option>Fukuoka</option><option>Saga</option><option>Nagasaki</option><option>Kumamoto</option><option>Oita</option><option>Miyazaki</option><option>Kagoshima</option><option>Okinawa</option>
    </select>
    <select class="filter-select" id="filter-min-price">
      <option value="0">Min price</option>
      <option value="1000000">¥1M+ (~AUD $9,600)</option>
      <option value="5000000">¥5M+ (~AUD $48,000)</option>
      <option value="10000000">¥10M+ (~AUD $96,000)</option>
    </select>
    <select class="filter-select" id="filter-max-price">
      <option value="0">Max price</option>
      <option value="1000000">Under ¥1M (AUD $9,600)</option>
      <option value="5000000">Under ¥5M (AUD $48,000)</option>
      <option value="10000000">Under ¥10M (AUD $96,000)</option>
      <option value="30000000">Under ¥30M (AUD $288,000)</option>
    </select>
    <button class="filter-btn" id="apply-filters">Apply</button>
    <button class="filter-clear" id="clear-filters">Clear all</button>
  </div>
</div>

<div class="results-area">
  <div class="results-meta">
    <div class="results-count" id="results-count">Loading listings…</div>
    <select class="sort-select" id="sort-select">
      <option value="newest">Newest first</option>
      <option value="price-asc">Price: Low to high</option>
      <option value="price-desc">Price: High to low</option>
      <option value="size-desc">Largest first</option>
    </select>
  </div>
  <div class="results-grid" id="results-grid">
    <div class="loading-state"><div class="spinner"></div><p style="color:var(--mist);font-size:0.9rem">Searching listings…</p></div>
  </div>
  <div class="pagination" id="pagination"></div>
</div>

<script>
const IMAGES = [
  'https://images.unsplash.com/photo-1528360983277-13d401cdc186?w=600&auto=format&fit=crop',
  'https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?w=600&auto=format&fit=crop',
  'https://images.unsplash.com/photo-1490806843957-31f4c9a91c65?w=600&auto=format&fit=crop',
  'https://images.unsplash.com/photo-1480796927426-f609979314bd?w=600&auto=format&fit=crop',
  'https://images.unsplash.com/photo-1542051841857-5f90071e7989?w=600&auto=format&fit=crop',
  'https://images.unsplash.com/photo-1431274172761-fca41d930114?w=600&auto=format&fit=crop',
  'https://images.unsplash.com/photo-1524413840807-0c3cb6fa808d?w=600&auto=format&fit=crop',
];

let allListings = [];
let currentPage = 1;
const PAGE_SIZE = 12;

function getUrlParams() {
  const url = new URL(window.location.href);
  return {
    q: url.searchParams.get('q') || '',
    prefecture: url.searchParams.get('prefecture') || '',
    min_price: parseInt(url.searchParams.get('min_price') || '0'),
    max_price: parseInt(url.searchParams.get('max_price') || '0'),
  };
}

function buildApiUrl(params) {
  const u = new URL('/api/search', window.location.origin);
  if (params.q) u.searchParams.set('q', params.q);
  if (params.prefecture) u.searchParams.set('prefecture', params.prefecture);
  if (params.min_price) u.searchParams.set('min_price', params.min_price);
  if (params.max_price) u.searchParams.set('max_price', params.max_price);
  return u.toString();
}

function renderCard(listing, index) {
  const img = listing.image_url ? '/api/img?url=' + encodeURIComponent(listing.image_url) : IMAGES[index % IMAGES.length];
  const isFree = listing.price_jpy === 0;
  const aud = isFree ? 'FREE' : 'AUD $' + Math.round(listing.price_aud).toLocaleString();
  const jpy = isFree ? '¥0 — Free transfer' : '¥' + listing.price_jpy.toLocaleString() + ' JPY';
  const city = (listing.city || listing.prefecture || '').substring(0, 35);
  const size = listing.size_m2 > 0 ? listing.size_m2 + ' m²' : '';
  const href = listing.source_url || '#';
  const title = (listing.title || 'Vacant house — ' + listing.prefecture).replace('不明', '').trim();

  return `<a class="result-card" href="${href}" target="_blank" rel="noopener">
    <div class="card-img-wrap">
      <img src="${img}" alt="Property in ${listing.prefecture}" loading="lazy">
      <span class="card-badge ${isFree ? 'free' : ''}">${isFree ? 'Free Transfer' : 'Akiya'}</span>
    </div>
    <div class="card-body">
      <div class="card-pref">${listing.prefecture}</div>
      <div class="card-title">${title}</div>
      <div class="card-price-aud ${isFree ? 'free-price' : ''}">${aud}</div>
      <div class="card-price-jpy">${jpy}</div>
      <div class="card-meta">
        ${size ? '<span class="meta-tag">' + size + '</span>' : ''}
        ${city ? '<span class="meta-tag">' + city + '</span>' : ''}
      </div>
      <div class="card-source">● ${listing.source} · Live data</div>
    </div>
  </a>`;
}

function sortListings(listings, sortBy) {
  const arr = [...listings];
  if (sortBy === 'price-asc') arr.sort((a, b) => a.price_jpy - b.price_jpy);
  else if (sortBy === 'price-desc') arr.sort((a, b) => b.price_jpy - a.price_jpy);
  else if (sortBy === 'size-desc') arr.sort((a, b) => b.size_m2 - a.size_m2);
  return arr;
}

function renderPage() {
  const sortBy = document.getElementById('sort-select').value;
  const sorted = sortListings(allListings, sortBy);
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = sorted.slice(start, start + PAGE_SIZE);
  const grid = document.getElementById('results-grid');

  if (page.length === 0) {
    grid.innerHTML = '<div class="empty-state"><div style="font-size:3rem">🏚</div><h3>No listings found</h3><p>Try a different search or remove filters.</p></div>';
    return;
  }
  grid.innerHTML = page.map((l, i) => renderCard(l, start + i)).join('');
  renderPagination(sorted.length);
}

function renderPagination(total) {
  const pages = Math.ceil(total / PAGE_SIZE);
  const pag = document.getElementById('pagination');
  if (pages <= 1) { pag.innerHTML = ''; return; }
  let html = '';
  for (let i = 1; i <= Math.min(pages, 20); i++) {
    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
  }
  pag.innerHTML = html;
}

window.goPage = function(n) {
  currentPage = n;
  renderPage();
  window.scrollTo({ top: 0, behavior: 'smooth' });
};

async function doSearch(params) {
  const grid = document.getElementById('results-grid');
  const countEl = document.getElementById('results-count');
  const heading = document.getElementById('result-heading');

  grid.innerHTML = '<div class="loading-state"><div class="spinner"></div><p style="color:var(--mist);font-size:0.9rem">Searching listings…</p></div>';

  if (params.q) {
    heading.textContent = 'results for "' + params.q + '"';
    document.getElementById('search-input').value = params.q;
  } else if (params.prefecture) {
    heading.textContent = 'vacant homes in ' + params.prefecture;
    document.getElementById('filter-prefecture').value = params.prefecture;
  } else {
    heading.textContent = 'all vacant homes in Japan';
  }

  try {
    const res = await fetch(buildApiUrl(params));
    const data = await res.json();
allListings = Array.isArray(data) ? data : (data.listings || []);
    currentPage = 1;
    const total = allListings.length;
    countEl.innerHTML = '<strong>' + total + ' listing' + (total !== 1 ? 's' : '') + '</strong> found';
    renderPage();
  } catch(e) {
    grid.innerHTML = '<div class="empty-state"><div style="font-size:3rem">⚠️</div><h3>Error loading listings</h3><p>Please try again.</p></div>';
    countEl.textContent = '';
  }
}

document.getElementById('search-form').addEventListener('submit', e => {
  e.preventDefault();
  const params = {
    q: document.getElementById('search-input').value.trim(),
    prefecture: document.getElementById('filter-prefecture').value,
    min_price: parseInt(document.getElementById('filter-min-price').value || '0'),
    max_price: parseInt(document.getElementById('filter-max-price').value || '0'),
  };
  const url = new URL(window.location.href);
  if (params.q) url.searchParams.set('q', params.q); else url.searchParams.delete('q');
  window.history.pushState({}, '', url);
  doSearch(params);
});

document.getElementById('apply-filters').addEventListener('click', () => {
  doSearch({
    q: document.getElementById('search-input').value.trim(),
    prefecture: document.getElementById('filter-prefecture').value,
    min_price: parseInt(document.getElementById('filter-min-price').value || '0'),
    max_price: parseInt(document.getElementById('filter-max-price').value || '0'),
  });
});

document.getElementById('clear-filters').addEventListener('click', () => {
  document.getElementById('search-input').value = '';
  document.getElementById('filter-prefecture').value = '';
  document.getElementById('filter-min-price').value = '0';
  document.getElementById('filter-max-price').value = '0';
  window.history.pushState({}, '', '/search');
  doSearch({q:'', prefecture:'', min_price:0, max_price:0});
});

document.getElementById('sort-select').addEventListener('change', () => {
  currentPage = 1;
  renderPage();
});

doSearch(getUrlParams());
</script>
</body>
</html>
